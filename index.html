<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Mobile Calculator Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mobile-frame">
    <!-- Header -->
    <header class="app-header">
        <h2>🧮 Calculator Pro</h2>
        <button id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle Theme">☀️</button>
    </header>

    <!-- Display Screen -->
    <div class="display-screen">
        <div class="expression-display" id="expressionDisplay"></div>
        <div class="result-value" id="resultDisplay">0</div>
    </div>

    <!-- Mobile Keypad -->
    <div class="keypad">
        <button class="btn-action" onclick="clearAll()">AC</button>
        <button class="btn-action" onclick="deleteLast()">⌫</button>
        <button class="btn-formula" onclick="openModal()">📐 Formulas & Ref</button>
        <button class="btn-operator" onclick="appendChar('÷')">÷</button>

        <button class="btn-number" onclick="appendChar('7')">7</button>
        <button class="btn-number" onclick="appendChar('8')">8</button>
        <button class="btn-number" onclick="appendChar('9')">9</button>
        <button class="btn-operator" onclick="appendChar('×')">×</button>

        <button class="btn-number" onclick="appendChar('4')">4</button>
        <button class="btn-number" onclick="appendChar('5')">5</button>
        <button class="btn-number" onclick="appendChar('6')">6</button>
        <button class="btn-operator" onclick="appendChar('-')">-</button>

        <button class="btn-number" onclick="appendChar('1')">1</button>
        <button class="btn-number" onclick="appendChar('2')">2</button>
        <button class="btn-number" onclick="appendChar('3')">3</button>
        <button class="btn-operator" onclick="appendChar('+')">+</button>

        <button class="btn-number span-2" onclick="appendChar('0')">0</button>
        <button class="btn-number" onclick="appendChar('.')">.</button>
        <button class="btn-equal" onclick="calculateResult()">=</button>
    </div>
</div>

<!-- Dynamic Formula Modal -->
<div id="formulaModal" class="modal-overlay">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✖</button>
        <h2>📐 Formula Library</h2>
        
        <!-- Search Bar -->
        <input type="text" id="formulaSearch" class="search-bar" placeholder="Search formulas, stats, physics..." onkeyup="filterFormulas()">
        
        <!-- Dynamic Content Container -->
        <div class="modal-content" id="formulaListContainer">
            <!-- JS will inject formulas here -->
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">Action Successful!</div>

<script src="script.js"></script>
</body>
</html>
