<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Calculator Pro</title>
<style>
    /* =========================================
       CSS: THEME & LAYOUT (DARK MODE DEFAULT)
       ========================================= */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        transition: background 0.3s ease, color 0.3s ease; /* Smooth transition */
    }

    body {
        background: linear-gradient(135deg, #0f172a 0%, #2e1065 100%);
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    /* Main Container */
    .app-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 100%;
        max-width: 900px;
    }

    @media (max-width: 768px) {
        .app-container {
            grid-template-columns: 1fr;
        }
    }

    /* Glassmorphism Cards */
    .glass-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    h2 {
        color: #00D4FF;
        font-size: 1.5rem;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* Inputs & Selects */
    select, input {
        width: 100%;
        padding: 14px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #ffffff;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s ease;
    }

    select option {
        background: #0f172a;
        color: #ffffff;
    }

    select:focus, input:focus {
        border-color: #00D4FF;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    /* Primary Neon Button */
    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        margin-top: 10px;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4);
    }

    button:active {
        transform: translateY(0);
    }

    /* Secondary Buttons */
    .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #94a3b8;
        font-size: 0.9rem;
        padding: 10px;
        margin-top: 0;
    }
    
    .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.2);
        box-shadow: none;
        color: white;
    }

    /* Right Panel Elements */
    .current-result-box {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .result-value {
        font-size: 2rem;
        font-weight: bold;
        color: #22c55e;
        margin: 10px 0;
        word-break: break-all;
    }

    .history-container {
        flex-grow: 1;
        overflow-y: auto;
        max-height: 230px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-right: 5px;
    }

    .history-container::-webkit-scrollbar { width: 6px; }
    .history-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
    }

    .history-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 12px;
        border-radius: 8px;
        font-size: 0.95rem;
        color: #e2e8f0;
        border-left: 4px solid #00D4FF;
        animation: fadeIn 0.3s ease-in;
    }

    /* Toast Notification */
    .toast {
        position: fixed;
        bottom: -60px;
        left: 50%;
        transform: translateX(-50%);
        background: #22c55e;
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        z-index: 1000;
    }

    .toast.show { bottom: 30px; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
    }

    /* =========================================
       CSS: LIGHT MODE OVERRIDES
       ========================================= */
    body.light-mode {
        background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
        color: #0f172a;
    }
    body.light-mode .glass-card {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(255, 255, 255, 1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    }
    body.light-mode h2 {
        color: #0284c7; /* Darker blue for contrast */
    }
    body.light-mode select, body.light-mode input {
        background: rgba(255, 255, 255, 0.8);
        color: #0f172a;
        border: 1px solid rgba(0, 0, 0, 0.15);
    }
    body.light-mode select option {
        background: #ffffff;
        color: #0f172a;
    }
    body.light-mode .btn-secondary {
        background: rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.15);
        color: #475569;
    }
    body.light-mode .btn-secondary:hover {
        background: rgba(0, 0, 0, 0.1);
        color: #0f172a;
    }
    body.light-mode .current-result-box {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(34, 197, 94, 0.5);
    }
    body.light-mode .history-item {
        background: rgba(255, 255, 255, 0.9);
        color: #334155;
        border-left: 4px solid #0284c7;
    }
    body.light-mode .history-container::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
    }
</style>
</head>
<body>

<div class="app-container">
    <!-- LEFT PANEL: CALCULATOR -->
    <div class="glass-card">
        <h2>🧮 Calculator Panel</h2>
        
        <!-- Theme Toggle Button -->
        <button id="themeToggleBtn" class="btn-secondary" onclick="toggleTheme()" style="margin-bottom: 10px;">☀️ Light Mode</button>
        
        <select id="operation" onchange="updateFields()">
            <option value="add">➕ Addition</option>
            <option value="sub">➖ Subtraction</option>
            <option value="mul">✖️ Multiplication</option>
            <option value="div">➗ Division</option>
            <option value="temp">🌡️ Celsius → Fahrenheit</option>
            <option value="km">📏 Kilometers → Miles</option>
            <option value="volume">🧊 Volume Calculator</option>
        </select>

        <div id="volumeBox" style="display: none;">
            <select id="shape" onchange="updateVolumeFields()">
                <option value="cube">Cube</option>
                <option value="cuboid">Cuboid</option>
                <option value="cylinder">Cylinder</option>
            </select>
        </div>

        <input type="number" id="num1" placeholder="First Number" autocomplete="off">
        <input type="number" id="num2" placeholder="Second Number" autocomplete="off">
        <input type="number" id="num3" placeholder="Third Number" style="display: none;" autocomplete="off">

        <button onclick="calculate(false)">Calculate</button>
    </div>

    <!-- RIGHT PANEL: RESULT & HISTORY -->
    <div class="glass-card">
        <h2>📊 Result & History</h2>
        
        <div class="current-result-box">
            <div style="color: inherit; opacity: 0.7; font-size: 0.9rem;">Current Result</div>
            <div class="result-value" id="currentResult">0</div>
            <button class="btn-secondary" style="padding: 8px; width: auto; font-size: 0.9rem;" onclick="copyResult()">
                📋 Copy Result
            </button>
        </div>

        <div style="color: inherit; opacity: 0.7; margin-top: 10px; font-size: 0.9rem;">Calculation History</div>
        <div class="history-container" id="historyList">
            <!-- History items populate here -->
        </div>
        
        <button class="btn-secondary" onclick="clearHistory()">🗑️ Clear History</button>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">Copied to clipboard!</div>

<script>
    /* =========================================
       JAVASCRIPT: LOGIC & DOM MANIPULATION
       ========================================= */

    const operation = document.getElementById("operation");
    const shape = document.getElementById("shape");
    const volumeBox = document.getElementById("volumeBox");
    const num1 = document.getElementById("num1");
    const num2 = document.getElementById("num2");
    const num3 = document.getElementById("num3");
    const currentResult = document.getElementById("currentResult");
    const historyList = document.getElementById("historyList");
    
    // --- THEME LOGIC ---
    function toggleTheme() {
        const body = document.body;
        const themeBtn = document.getElementById('themeToggleBtn');
        body.classList.toggle('light-mode');
        
        if (body.classList.contains('light-mode')) {
            themeBtn.innerHTML = '🌙 Dark Mode';
            localStorage.setItem('calcTheme', 'light');
        } else {
            themeBtn.innerHTML = '☀️ Light Mode';
            localStorage.setItem('calcTheme', 'dark');
        }
    }

    // Check saved theme on load
    if (localStorage.getItem('calcTheme') === 'light') {
        document.body.classList.add('light-mode');
        document.getElementById('themeToggleBtn').innerHTML = '🌙 Dark Mode';
    }

    // --- CALCULATOR LOGIC ---
    let historyArr = JSON.parse(sessionStorage.getItem('calcHistory')) || [];
    renderHistory();
    updateFields(); 

    function updateFields() {
        const op = operation.value;
        
        num1.style.display = "block";
        num2.style.display = "block";
        num3.style.display = "none";
        volumeBox.style.display = "none";
        num1.value = ""; num2.value = ""; num3.value = "";

        switch(op) {
            case "add":
            case "sub":
            case "mul":
                num1.placeholder = "First Number";
                num2.placeholder = "Second Number";
                break;
            case "div":
                num1.placeholder = "Dividend";
                num2.placeholder = "Divisor";
                break;
            case "temp":
                num1.placeholder = "Temperature in Celsius";
                num2.style.display = "none";
                break;
            case "km":
                num1.placeholder = "Distance in Kilometers";
                num2.style.display = "none";
                break;
            case "volume":
                volumeBox.style.display = "block";
                updateVolumeFields();
                break;
        }
        calculate(true); 
    }

    function updateVolumeFields() {
        num1.value = ""; num2.value = ""; num3.value = "";
        
        switch(shape.value) {
            case "cube":
                num1.placeholder = "Side Length";
                num2.style.display = "none";
                num3.style.display = "none";
                break;
            case "cuboid":
                num1.placeholder = "Length";
                num2.placeholder = "Breadth";
                num3.placeholder = "Height";
                num2.style.display = "block";
                num3.style.display = "block";
                break;
            case "cylinder":
                num1.placeholder = "Radius";
                num2.placeholder = "Height";
                num2.style.display = "block";
                num3.style.display = "none";
                break;
        }
        calculate(true);
    }

    function calculate(isLivePreview = false) {
        const op = operation.value;
        const n1 = parseFloat(num1.value) || 0;
        const n2 = parseFloat(num2.value) || 0;
        const n3 = parseFloat(num3.value) || 0;
        
        let ans = 0;
        let formula = "";

        if (isLivePreview && num1.value === "") {
            currentResult.innerText = "0";
            return;
        }

        switch(op) {
            case "add":
                ans = n1 + n2;
                formula = `${n1} + ${n2} = ${ans}`;
                break;
            case "sub":
                ans = n1 - n2;
                formula = `${n1} - ${n2} = ${ans}`;
                break;
            case "mul":
                ans = n1 * n2;
                formula = `${n1} × ${n2} = ${ans}`;
                break;
            case "div":
                if(n2 === 0) {
                    ans = "Error";
                    formula = "Cannot Divide by Zero";
                } else {
                    ans = parseFloat((n1 / n2).toFixed(4));
                    formula = `${n1} ÷ ${n2} = ${ans}`;
                }
                break;
            case "temp":
                ans = parseFloat(((n1 * 9) / 5) + 32).toFixed(2);
                formula = `${n1}°C → ${ans}°F`;
                ans += " °F";
                break;
            case "km":
                ans = parseFloat(n1 * 0.621371).toFixed(4);
                formula = `${n1} km → ${ans} mi`;
                ans += " mi";
                break;
            case "volume":
                switch(shape.value) {
                    case "cube":
                        ans = Math.pow(n1, 3);
                        formula = `Cube(${n1}) = ${ans}`;
                        break;
                    case "cuboid":
                        ans = n1 * n2 * n3;
                        formula = `Cuboid(${n1}×${n2}×${n3}) = ${ans}`;
                        break;
                    case "cylinder":
                        ans = parseFloat((Math.PI * Math.pow(n1, 2) * n2).toFixed(2));
                        formula = `Cylinder(r:${n1}, h:${n2}) = ${ans}`;
                        break;
                }
                break;
        }

        currentResult.innerText = ans;

        if (!isLivePreview && formula !== "Cannot Divide by Zero" && num1.value !== "") {
            addToHistory(formula);
        }
    }

    [num1, num2, num3].forEach(input => {
        input.addEventListener('input', () => calculate(true));
    });

    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') calculate(false);
    });

    function addToHistory(formula) {
        historyArr.unshift(formula);
        if (historyArr.length > 20) historyArr.pop();
        sessionStorage.setItem('calcHistory', JSON.stringify(historyArr));
        renderHistory();
    }

    function renderHistory() {
        historyList.innerHTML = "";
        if (historyArr.length === 0) {
            historyList.innerHTML = `<div style="opacity: 0.5; text-align: center; margin-top: 20px;">No history yet...</div>`;
            return;
        }
        historyArr.forEach(item => {
            const div = document.createElement("div");
            div.className = "history-item";
            div.innerText = item;
            historyList.appendChild(div);
        });
    }

    function clearHistory() {
        historyArr = [];
        sessionStorage.removeItem('calcHistory');
        renderHistory();
        showToast("History Cleared");
    }

    function copyResult() {
        const resultText = currentResult.innerText;
        if(resultText !== "0" && resultText !== "Error") {
            navigator.clipboard.writeText(resultText);
            showToast("Copied to clipboard!");
        }
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
    }
</script>
</body>
</html>
